<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Mission Control</title>
    <link rel="stylesheet" href="mission-control.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">Firefox Extension</p>
          <h1>Mission Control</h1>
          <p class="subtitle">
            Visual overview of tabs in the current window
          </p>
        </div>

        <div class="topbar-actions">
          <label class="search-field" for="search-input">
            <span class="search-label">Search tabs</span>
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              placeholder="Filter by title or URL"
            />
          </label>

          <div class="pagination-controls">
            <button id="prev-page" type="button" class="nav-button">
              Previous
            </button>
            <span id="page-indicator" class="page-indicator">Page 1 of 1</span>
            <button id="next-page" type="button" class="nav-button">
              Next
            </button>
          </div>
        </div>
      </header>

      <section class="status-bar" aria-live="polite">
        <span id="results-summary">Loading tabs…</span>
        <span class="keyboard-hint">
          Arrows move, Enter opens, Esc closes, Cmd/Ctrl + Left/Right changes
          pages
        </span>
      </section>

      <main>
        <div id="empty-state" class="empty-state" hidden>
          <h2>No matching tabs</h2>
          <p>Try a different search query.</p>
        </div>

        <div
          id="tab-grid"
          class="tab-grid"
          role="listbox"
          aria-label="Open tabs"
        ></div>
      </main>
    </div>

    <template id="tab-card-template">
      <article class="tab-card" role="option" tabindex="-1">
        <div class="preview-shell" aria-hidden="true">
          <button type="button" class="close-button" aria-label="Close tab" tabindex="-1">
            ×
          </button>
          <div class="preview-backdrop"></div>
          <div class="preview-content">
            <div class="preview-favicon"></div>
            <span class="preview-domain"></span>
          </div>
        </div>

        <div class="tab-card-content">
          <div class="tab-card-header">
            <img class="favicon" alt="" width="18" height="18" />
            <span class="active-pill">Active</span>
          </div>
          <h2 class="tab-title"></h2>
          <p class="tab-url"></p>
        </div>
      </article>
    </template>

    <script src="mission-control.js"></script>
  </body>
</html>
